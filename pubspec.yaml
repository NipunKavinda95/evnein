name: evnein
description: "EVNEIN Juice & Cake Shop Management App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # Local Database (Offline First)
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF Generation
  #pdf: ^3.8.5
  #printing: ^5.11.3

  # Bluetooth Printing
  #esc_pos_bluetooth: ^0.4.0
  #esc_pos_utils: ^1.0.5
  #flutter_bluetooth_serial: ^0.4.0

  # WhatsApp / Share
  share_plus: ^7.2.1
  url_launcher: ^6.2.2

  # UI & Icons
  flutter_screenutil: ^5.9.0
  google_fonts: ^4.0.4
  iconsax: ^0.0.8
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.1

  # Image Picker
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  path_provider: ^2.1.2
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  pdf: ^3.11.3
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
